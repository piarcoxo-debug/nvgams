<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NovaRush V3</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="game-card">
      <header class="topbar">
        <div class="brand-box">
          <div class="brand">NOVA RUSH</div>
          <div class="status-row">
            <span id="gameStateBadge" class="badge badge-idle">Ожидание</span>
            <span class="badge badge-limit">Макс. 50.00x</span>
          </div>
        </div>

        <div class="center-readout">
          <div id="multiplier" class="multiplier">1.00x</div>
          <div id="statusText" class="status-text">Нажми «Старт», чтобы начать раунд</div>
        </div>

        <div class="side-panel">
          <div class="balance-box">
            <span>Баланс</span>
            <strong id="balance">10 000 монет</strong>
          </div>
          <div class="history-box">
            <span>Последние раунды</span>
            <div id="historyList" class="history-list"></div>
          </div>
        </div>
      </header>

      <main class="scene-wrap">
        <div class="parallax city-back"></div>
        <div class="parallax city-front"></div>
        <canvas id="trailCanvas" class="trail-canvas"></canvas>
        <div id="sparkLayer" class="spark-layer"></div>
        <div id="explosion" class="explosion hidden"></div>
        <div id="pilot" class="pilot state-idle" aria-label="персонаж"></div>
        <div class="ground-line"></div>
      </main>

      <footer class="control-bar">
        <div class="bet-panel">
          <label for="betInput">Ставка</label>
          <div class="bet-row">
            <button id="minusBtn" type="button" class="mini-btn">-50</button>
            <input id="betInput" type="number" inputmode="numeric" min="10" step="10" value="100" />
            <button id="plusBtn" type="button" class="mini-btn">+50</button>
          </div>
          <div class="bet-presets">
            <button type="button" class="preset-btn" data-bet="100">100</button>
            <button type="button" class="preset-btn" data-bet="500">500</button>
            <button type="button" class="preset-btn" data-bet="1000">1000</button>
            <button type="button" class="preset-btn" data-bet="5000">5000</button>
            <button type="button" class="preset-btn" data-bet="10000">10000</button>
          </div>
        </div>

        <div class="action-panel">
          <button id="startBtn" type="button" class="action-btn start-btn">Старт</button>
          <button id="cashoutBtn" type="button" class="action-btn cashout-btn" disabled>Забрать</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="telegram.js"></script>
  <script src="app.js"></script>
</body>
</html>
