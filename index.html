<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOVA RUSH</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=ready-1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">NOVA RUSH</div>
      <div class="balance-box">
        <div class="balance-label">Баланс</div>
        <div class="balance-value" id="balanceValue">10 000 монет</div>
      </div>
    </header>

    <section id="historyStrip" class="history-strip"></section>

    <section class="stage" id="stage">
      <div class="stage-glow"></div>
      <canvas id="trailCanvas"></canvas>
      <div id="multiplierValue" class="multiplier">1.00x</div>
      <img id="pilot" class="pilot" src="assets/pilot.png" alt="pilot" />
      <div id="explosion" class="explosion hidden"></div>
      <img class="city" src="assets/city.svg" alt="city" />
      <div class="cloud cloud-a"></div>
      <div class="cloud cloud-b"></div>
      <div class="cloud cloud-c"></div>
    </section>

    <section class="controls">
      <div class="bet-row primary-bet-row">
        <button type="button" class="delta-btn" data-delta="-50">-50</button>
        <input id="betInput" class="bet-input" type="number" min="50" step="50" inputmode="numeric" />
        <button type="button" class="delta-btn" data-delta="50">+50</button>
      </div>
      <div class="bet-row quick-row" id="quickButtons"></div>
      <div class="action-row">
        <button type="button" id="startBtn" class="action-btn start-btn">СТАВКА</button>
        <button type="button" id="cashoutBtn" class="action-btn cashout-btn" disabled>ЗАБРАТЬ</button>
      </div>
    </section>
  </div>
  <script src="config.js?v=ready-1"></script>
  <script src="telegram.js?v=ready-1"></script>
  <script src="app.js?v=ready-1"></script>
</body>
</html>
