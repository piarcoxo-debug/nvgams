<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NOVA RUSH</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=phone-final-1" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">NOVA RUSH</div>
      <div class="balance-box">
        <span class="label">Баланс</span>
        <span id="balanceValue" class="value">10 000 монет</span>
      </div>
    </header>

    <section id="historyStrip" class="history-strip"></section>

    <main class="stage-wrap">
      <section class="stage" id="stage">
        <div class="sky-glow"></div>
        <div class="multiplier" id="multiplierValue">1.00x</div>
        <canvas id="trailCanvas"></canvas>
        <div id="explosion" class="explosion hidden"></div>
        <img id="pilot" class="pilot" src="assets/pilot.png" alt="pilot" />
        <div class="city-line"></div>
        <img class="city" src="assets/city.svg" alt="city" />
      </section>

      <section class="controls">
        <div class="bet-panel">
          <div class="bet-row top-row">
            <button type="button" class="mini-btn" data-delta="-50">-50</button>
            <input id="betInput" class="bet-input" type="number" min="50" step="50" inputmode="numeric" />
            <button type="button" class="mini-btn" data-delta="50">+50</button>
          </div>
          <div class="bet-row quick-row" id="quickButtons"></div>
        </div>
        <div class="action-panel">
          <button type="button" id="startBtn" class="action-btn start-btn">СТАВКА</button>
          <button type="button" id="cashoutBtn" class="action-btn cashout-btn" disabled>ЗАБРАТЬ</button>
        </div>
      </section>
    </main>
  </div>
  <script src="config.js"></script>
  <script src="telegram.js?v=phone-final-1"></script>
  <script src="app.js?v=phone-final-1"></script>
</body>
</html>
