<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nova Rush</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=final2" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="game-card">
      <header class="topbar">
        <div class="logo-box panel">
          <div class="brand">NOVA<br>RUSH</div>
          <div class="badge-row">
            <span id="gameStateBadge" class="chip chip-idle">Ожидание</span>
            <span class="chip chip-limit">Макс. 50.00x</span>
          </div>
        </div>

        <div class="center-box">
          <div id="multiplier" class="multiplier">1.00x</div>
          <div id="statusText" class="status-text">Нажми «Старт»</div>
        </div>

        <div class="side-boxes">
          <div class="side-box panel balance-box">
            <div class="side-label">Баланс</div>
            <div id="balance" class="balance-value">10 000 монет</div>
          </div>
          <div class="side-box panel history-box">
            <div class="side-label">Последние раунды</div>
            <div id="historyList" class="history-list"></div>
          </div>
        </div>
      </header>

      <main id="sceneWrap" class="scene-wrap">
        <div class="parallax city-back"></div>
        <canvas id="trailCanvas" class="trail-canvas"></canvas>
        <div id="sparkLayer" class="spark-layer"></div>
        <div id="explosion" class="explosion hidden"></div>
        <div id="pilot" class="pilot"></div>
        <div class="parallax city-front"></div>
        <div class="ground-glow"></div>
      </main>

      <footer class="controls">
        <div class="bet-panel panel">
          <div class="bet-label">Ставка</div>
          <div class="bet-main-row">
            <button id="minusBtn" type="button" class="mini-btn">-50</button>
            <input id="betInput" type="number" inputmode="numeric" min="10" step="10" value="100" />
            <button id="plusBtn" type="button" class="mini-btn">+50</button>
          </div>
          <div class="preset-row">
            <button type="button" class="preset-btn" data-bet="100">100</button>
            <button type="button" class="preset-btn" data-bet="500">500</button>
            <button type="button" class="preset-btn" data-bet="1000">1000</button>
            <button type="button" class="preset-btn" data-bet="5000">5000</button>
            <button type="button" class="preset-btn" data-bet="10000">10000</button>
          </div>
        </div>

        <div class="action-panel panel">
          <button id="startBtn" type="button" class="action-btn start-btn">Старт</button>
          <button id="cashoutBtn" type="button" class="action-btn cashout-btn" disabled>Забрать</button>
        </div>
      </footer>
    </div>
  </div>

  <script src="config.js?v=final2"></script>
  <script src="telegram.js?v=final2"></script>
  <script src="app.js?v=final2"></script>
</body>
</html>
